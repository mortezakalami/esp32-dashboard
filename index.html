<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ایستگاه هواشناسی ESP32</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-cloud-sun"></i> ایستگاه هواشناسی</h1>
      <div class="uptime-box">
        <i class="fas fa-clock"></i>
        <span id="uptime">--</span>
      </div>
    </header>

    <!-- کارت‌های اصلی -->
    <div class="cards-grid">
      <div class="card glass">
        <div class="card-icon"><i class="fas fa-thermometer-half"></i></div>
        <h3>دمای فعلی</h3>
        <div class="value" id="temperature">-- °C</div>
        <div class="sub-info">
          <span>احساسی: <span id="heatIndex">--</span> °C</span>
          <span>نقطه شبنم: <span id="dewPoint">--</span> °C</span>
        </div>
      </div>

      <div class="card glass">
        <div class="card-icon"><i class="fas fa-tint"></i></div>
        <h3>رطوبت فعلی</h3>
        <div class="value" id="humidity">-- %</div>
      </div>
    </div>

    <!-- آمار روزانه -->
    <div class="stats-grid glass">
      <div class="stat-item">
        <span class="stat-label">حداقل دما</span>
        <span class="stat-value" id="tempMin">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">حداکثر دما</span>
        <span class="stat-value" id="tempMax">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">میانگین دما</span>
        <span class="stat-value" id="tempAvg">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">حداقل رطوبت</span>
        <span class="stat-value" id="humMin">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">حداکثر رطوبت</span>
        <span class="stat-value" id="humMax">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">میانگین رطوبت</span>
        <span class="stat-value" id="humAvg">--</span>
      </div>
    </div>

    <!-- کنترل بازه زمانی نمودار -->
    <div class="chart-controls glass">
      <div class="control-group">
        <label>از تاریخ:</label>
        <input type="datetime-local" id="fromDate" />
      </div>
      <div class="control-group">
        <label>تا تاریخ:</label>
        <input type="datetime-local" id="toDate" />
      </div>
      <button id="applyCustomRange" class="btn-primary"><i class="fas fa-check"></i> اعمال بازه</button>
      <button id="resetRange" class="btn-secondary"><i class="fas fa-undo"></i> بازنشانی</button>
    </div>

    <!-- دکمه‌های بازه سریع -->
    <div class="toolbar">
      <button onclick="loadHistory('1h')">۱ ساعت</button>
      <button onclick="loadHistory('12h')">۱۲ ساعت</button>
      <button onclick="loadHistory('7d')">۷ روز</button>
    </div>

    <!-- نمودارها -->
    <div class="chart-card glass">
      <h2><i class="fas fa-chart-line"></i> دما</h2>
      <canvas id="tempChart"></canvas>
    </div>

    <div class="chart-card glass">
      <h2><i class="fas fa-chart-line"></i> رطوبت</h2>
      <canvas id="humChart"></canvas>
    </div>

    <!-- تنظیمات -->
    <div class="settings glass">
      <h2><i class="fas fa-sliders-h"></i> تنظیمات</h2>
      <div class="settings-grid">
        <label>دمای حداقل</label>
        <input type="number" id="temp_min" step="0.1" />
        <label>دمای حداکثر</label>
        <input type="number" id="temp_max" step="0.1" />
        <label>رطوبت حداقل</label>
        <input type="number" id="hum_min" step="0.1" />
        <label>رطوبت حداکثر</label>
        <input type="number" id="hum_max" step="0.1" />
        
        <label>فاصله ارسال تاریخی (ms)</label>
        <input type="number" id="upload_interval" step="1000" />
        
        <label>فاصله به‌روزرسانی لحظه‌ای (ثانیه)</label>
        <input type="number" id="realtime_interval" step="1" min="1" />
        
        <label>ارسال به تلگرام</label>
        <select id="telegram_enable">
          <option value="0">غیرفعال</option>
          <option value="1">فعال</option>
        </select>

        <label>فعال بودن بوق</label>
        <select id="buzzer_enabled">
          <option value="1">فعال</option>
          <option value="0">غیرفعال</option>
        </select>

        <label>فعال بودن نمایشگر</label>
        <select id="display_enabled">
          <option value="1">فعال</option>
          <option value="0">غیرفعال</option>
        </select>
      </div>
      <div class="settings-actions">
        <button onclick="saveSettings()" class="btn-primary"><i class="fas fa-save"></i> ذخیره تنظیمات</button>
        <button onclick="testBuzzer()" class="btn-secondary"><i class="fas fa-bell"></i> تست بوق</button>
        <button onclick="clearDatabase()" class="btn-danger"><i class="fas fa-trash-alt"></i> پاک کردن دیتابیس</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
